<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8B5CF6">
    <title>Offline - SYNAWATCH</title>
    <link rel="icon" type="image/svg+xml" href="images/icons/icon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #F5F3FF 0%, #EDE9FE 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .offline-container {
            text-align: center;
            max-width: 400px;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow: 0 16px 48px rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .offline-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
        }

        .offline-icon svg {
            width: 56px;
            height: 56px;
            fill: white;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1rem;
            color: #6366f1;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .tips {
            margin-top: 48px;
            padding: 24px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            text-align: left;
        }

        .tips h3 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tips h3 svg {
            width: 16px;
            height: 16px;
            fill: #8B5CF6;
        }

        .tips ul {
            list-style: none;
            font-size: 0.875rem;
            color: #6b7280;
        }

        .tips li {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tips li::before {
            content: '•';
            color: #8B5CF6;
            font-weight: bold;
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24" class="pulse">
                <path d="M2.28 3.28a.75.75 0 011.06-.01l17.37 17.38a.75.75 0 11-1.06 1.06L2.28 4.34a.75.75 0 01-.01-1.06z"/>
                <path d="M5.5 8.37A8.98 8.98 0 003 12.5a.75.75 0 01-1.5 0c0-2.14.8-4.1 2.12-5.59L5.5 8.37zM12 4.5c1.81 0 3.5.53 4.91 1.45l1.08-1.08A10.47 10.47 0 0012 3c-2.93 0-5.6 1.2-7.53 3.14l1.07 1.07A8.98 8.98 0 0112 4.5zM8.06 11.56A4.49 4.49 0 0112 10c1.15 0 2.2.43 3 1.14l1.08-1.08A5.98 5.98 0 0012 8.5c-1.63 0-3.12.65-4.2 1.7l1.06 1.06-.8.3zM12 13.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5z"/>
            </svg>
        </div>

        <h1>You're Offline</h1>
        <p>No internet connection detected. Please check your network settings and try again.</p>

        <button class="retry-btn" onclick="location.reload()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
            Try Again
        </button>

        <div class="tips">
            <h3>
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                </svg>
                While offline, you can:
            </h3>
            <ul>
                <li>View your cached health data</li>
                <li>Review previous analytics</li>
                <li>Read past chat messages</li>
            </ul>
        </div>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
