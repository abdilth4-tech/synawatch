<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SYNAWATCH Synachat - AI Health Assistant">
    <meta name="theme-color" content="#7c3aed">
    <title>Synachat - SYNAWATCH</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* Synachat Page Specific Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--nav-height));
            padding-bottom: var(--nav-height);
        }

        .chat-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: var(--space-4) var(--space-5);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            border-bottom: 1px solid var(--gray-100);
            box-shadow: var(--shadow-sm);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-xl);
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: var(--text-xl);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }

        .chat-info {
            flex: 1;
        }

        .chat-info .name {
            font-weight: var(--font-bold);
            font-size: var(--text-base);
            color: var(--gray-900);
        }

        .chat-info .status {
            font-size: var(--text-xs);
            font-weight: var(--font-medium);
            color: var(--success-500);
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        .chat-info .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--success-500);
            border-radius: 50%;
            box-shadow: 0 0 0 3px var(--success-100);
        }

        .chat-actions {
            display: flex;
            gap: var(--space-2);
        }

        .chat-action-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-lg);
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            transition: all var(--transition-base);
        }

        .chat-action-btn:hover {
            background: var(--primary-50);
            color: var(--primary-500);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-5);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            background: var(--gray-50);
        }

        .message {
            display: flex;
            gap: var(--space-3);
            max-width: 85%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: var(--text-sm);
        }

        .message.assistant .message-avatar {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 3px 8px rgba(124, 58, 237, 0.2);
        }

        .message.user .message-avatar {
            background: var(--gray-200);
            color: var(--gray-600);
        }

        .message-bubble {
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-xl);
            line-height: 1.6;
            font-size: var(--text-sm);
        }

        .message.assistant .message-bubble {
            background: white;
            color: var(--gray-800);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
        }

        .message.user .message-bubble {
            background: var(--gradient-primary);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }

        .message-time {
            font-size: 10px;
            color: var(--gray-400);
            margin-top: var(--space-1);
            text-align: right;
        }

        .message.user .message-time {
            text-align: left;
        }

        .typing-indicator {
            display: flex;
            gap: var(--space-1);
            padding: var(--space-4);
        }

        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: var(--gray-300);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .input-container {
            padding: var(--space-4) var(--space-5);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--gray-100);
        }

        .input-wrapper {
            display: flex;
            gap: var(--space-3);
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-xl);
            font-size: var(--text-base);
            font-family: inherit;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            transition: all var(--transition-base);
            background: var(--gray-50);
        }

        .message-input:hover {
            border-color: var(--gray-300);
        }

        .message-input:focus {
            border-color: var(--primary-500);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-50);
            outline: none;
        }

        .message-input::placeholder {
            color: var(--gray-400);
        }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-xl);
            background: var(--gradient-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-lg);
            transition: all var(--transition-base);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.35);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .send-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .quick-actions {
            display: flex;
            gap: var(--space-2);
            margin-top: var(--space-3);
            flex-wrap: wrap;
        }

        .quick-action {
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-full);
            background: var(--primary-50);
            color: var(--primary-600);
            font-size: var(--text-xs);
            font-weight: var(--font-medium);
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            gap: var(--space-1);
            border: 1px solid var(--primary-100);
        }

        .quick-action:hover {
            background: var(--primary-100);
            color: var(--primary-700);
            transform: translateY(-1px);
        }

        .health-context {
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border-radius: var(--radius-xl);
            padding: var(--space-4);
            margin: var(--space-4) var(--space-5) 0;
            font-size: var(--text-xs);
            border: 1px solid var(--primary-200);
        }

        .health-context .title {
            font-weight: var(--font-semibold);
            margin-bottom: var(--space-3);
            color: var(--primary-700);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .health-context .metrics {
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .health-context .metric {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            color: var(--gray-700);
            font-weight: var(--font-medium);
        }

        .welcome-message {
            text-align: center;
            padding: var(--space-10) var(--space-5);
        }

        .welcome-message .icon {
            width: 88px;
            height: 88px;
            background: var(--gradient-primary);
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-5);
            font-size: 2.25rem;
            color: white;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
        }

        .welcome-message h2 {
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            margin-bottom: var(--space-2);
            color: var(--gray-900);
        }

        .welcome-message p {
            color: var(--gray-500);
            margin-bottom: var(--space-6);
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .welcome-message .quick-actions {
            justify-content: center;
        }

        .welcome-message .quick-action {
            background: white;
            border: 1px solid var(--gray-200);
            color: var(--gray-700);
            padding: var(--space-3) var(--space-4);
            font-size: var(--text-sm);
            box-shadow: var(--shadow-sm);
        }

        .welcome-message .quick-action:hover {
            background: var(--primary-50);
            border-color: var(--primary-200);
            color: var(--primary-600);
        }
    </style>
</head>
<body data-protected>
    <div class="app-container">
        <!-- Chat Container -->
        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="chat-avatar">
                    <i class="fas fa-user-md"></i>
                </div>
                <div class="chat-info">
                    <div class="name">Dr. Synachat</div>
                    <div class="status">Online</div>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn" onclick="toggleHealthContext()" title="Show health data">
                        <i class="fas fa-heartbeat"></i>
                    </button>
                    <button class="chat-action-btn" onclick="clearChat()" title="Clear chat">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Health Context (hidden by default) -->
            <div id="healthContext" class="health-context" style="display: none;">
                <div class="title"><i class="fas fa-chart-line"></i> Current Health Data</div>
                <div class="metrics">
                    <div class="metric"><i class="fas fa-heart" style="color: var(--danger-500);"></i> <span id="contextHr">--</span> BPM</div>
                    <div class="metric"><i class="fas fa-lungs" style="color: var(--info-500);"></i> <span id="contextSpo2">--</span>%</div>
                    <div class="metric"><i class="fas fa-brain" style="color: var(--warning-500);"></i> Stress: <span id="contextStress">--</span>%</div>
                    <div class="metric"><i class="fas fa-hand" style="color: var(--primary-500);"></i> GSR: <span id="contextGsr">--</span>%</div>
                    <div class="metric"><i class="fas fa-temperature-half" style="color: var(--success-500);"></i> <span id="contextTemp">--</span>°C</div>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer" class="messages-container">
                <!-- Welcome Message -->
                <div id="welcomeMessage" class="welcome-message">
                    <div class="icon">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <h2>Hi, I'm Dr. Synachat!</h2>
                    <p>Your AI health assistant. I can help you understand your health data, provide wellness tips, and offer support for your mental health journey.</p>
                    <div class="quick-actions">
                        <button class="quick-action" onclick="sendQuickMessage('How is my heart rate today?')">
                            <i class="fas fa-heart"></i> Heart Health
                        </button>
                        <button class="quick-action" onclick="sendQuickMessage('I feel stressed, can you help?')">
                            <i class="fas fa-brain"></i> Stress Help
                        </button>
                        <button class="quick-action" onclick="sendQuickMessage('Give me some wellness tips')">
                            <i class="fas fa-lightbulb"></i> Wellness Tips
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Container -->
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="Type your message..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button id="sendBtn" class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="quick-actions">
                    <button class="quick-action" onclick="sendQuickMessage('Analyze my health data')">
                        <i class="fas fa-chart-pie"></i> Analyze Data
                    </button>
                    <button class="quick-action" onclick="sendQuickMessage('How can I reduce stress?')">
                        <i class="fas fa-spa"></i> Reduce Stress
                    </button>
                    <button class="quick-action" onclick="sendQuickMessage('Tell me about my GSR readings')">
                        <i class="fas fa-hand"></i> GSR Info
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/config.keys.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/ble-connection.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/synachat.js"></script>
</body>
</html>
